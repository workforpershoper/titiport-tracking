<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titiport Admin</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f7fb;margin:0;padding:15px}
.box{max-width:600px;margin:auto;background:white;padding:22px;border-radius:18px}
label{font-weight:bold;margin-top:12px;display:block}
input,select,textarea{width:100%;box-sizing:border-box;padding:13px;margin-top:6px;border:1px solid #ddd;border-radius:10px}
button{width:100%;margin-top:18px;padding:15px;border:0;border-radius:12px;background:#0b8ff0;color:white;font-weight:bold}
</style>
</head>
<body>

<div class="box">
<h2>📦 Titiport Admin</h2>

<form method="GET" target="hiddenFrame" action="https://script.google.com/macros/s/AKfycbzMfhZh1BVumJ4UozTcSPqUfuqO3ArFiOSJWnVkHalsDjESHdIi94WtkFWTz7oqMCTu/exec" onsubmit="alert('Data dikirim. Cek TRACKING_PUBLIC ya.')">

<input type="hidden" name="action" value="add">

<label>Item Tracking ID</label>
<input name="itemTrackingId">

<label>Order ID</label>
<input name="orderId">

<label>Customer ID</label>
<input name="customerId">

<label>Nama Customer</label>
<input name="namaCustomer">

<label>No Telp / WA</label>
<input name="noTelp">

<label>Alamat</label>
<textarea name="alamat"></textarea>

<label>Kota</label>
<input name="kota">

<label>Nama Barang</label>
<input name="namaBarang">

<label>Link Produk</label>
<input name="linkProduk">

<label>Qty</label>
<input name="qty">

<label>Variasi</label>
<input name="variasi">

<label>Platform Sumber</label>
<select name="platform">
<option>Taobao</option>
<option>Pinduoduo</option>
<option>1688</option>
<option>JD</option>
<option>XHS</option>
<option>Offline Guangzhou</option>
</select>

<label>Jenis Pengiriman</label>
<select name="jenisPengiriman">
<option>Handcarry</option>
<option>Cargo Udara</option>
<option>Cargo Laut</option>
</select>

<label>Batch ID</label>
<input name="batchId">

<label>Status Order</label>
<select name="statusOrder">
<option>Pesanan Masuk</option>
<option>Pembayaran Diterima</option>
<option>Proses Pembelian</option>
<option>Barang Tiba di Warehouse</option>
<option>Barang Sedang Dikirim Menuju Indonesia</option>
<option>Barang Tiba di Indonesia</option>
<option>Proses Repack</option>
<option>Pengiriman Menuju Alamat Customer</option>
<option>Pesanan Diterima</option>
</select>

<label>ETA Manual</label>
<input name="etaManual" type="date">

<label>Catatan Customer</label>
<textarea name="catatanCustomer"></textarea>

<label>Foto Seller</label>
<input name="fotoSeller">

<label>Foto Warehouse</label>
<input name="fotoWarehouse">

<label>Foto Indonesia</label>
<input name="fotoIndonesia">

<button type="submit">Simpan ke OMS</button>
</form>

<iframe name="hiddenFrame" style="display:none"></iframe>
</div>

</body>
</html>
