<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Titiport Tracking</title>

<style>

body{

background:#f5f5f5;
font-family:Arial;
margin:0;
padding:0;

}

.container{

max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0px 0px 15px rgba(0,0,0,.1);

}

h1{

text-align:center;
color:#0099ff;

}

input{

width:100%;
padding:15px;
font-size:18px;
margin-top:20px;
border-radius:10px;
border:1px solid #ddd;

}

button{

margin-top:15px;
width:100%;
padding:15px;
font-size:18px;
background:#0099ff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;

}

button:hover{

background:#0077cc;

}

.card{

margin-top:30px;
background:#f7f7f7;
padding:20px;
border-radius:10px;

}

.row{

margin-bottom:12px;

}

.title{

font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h1>📦 Titiport Tracking</h1>

<input
id="tracking"
placeholder="Masukkan Nomor Tracking / WA">

<button onclick="cekTracking()">

Lihat Status

</button>

<div id="hasil"></div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbzMfhZh1BVumJ4UozTcSPqUfuqO3ArFiOSJWnVkHalsDjESHdIi94WtkFWTz7oqMCTu/exec";
  
function cekTracking(){

let nomor=document.getElementById("tracking").value;

fetch(api+"?q="+nomor)

.then(res=>res.json())

.then(data=>{

if(data.success){

let d=data.data[0];

document.getElementById("hasil").innerHTML=`

<div class="card">

<div class="row"><b>Tracking :</b> ${d["Tracking / Order ID"]}</div>

<div class="row"><b>Nama :</b> ${d["Nama Customer"]}</div>

<div class="row"><b>Barang :</b> ${d["Nama Barang"]}</div>

<div class="row"><b>Jumlah :</b> ${d["Jumlah"]}</div>

<div class="row"><b>Status :</b> ${d["Status Order"]}</div>

<div class="row"><b>ETA :</b> ${d["ETA Manual"]}</div>

<div class="row"><b>Catatan :</b> ${d["Catatan Customer"]}</div>

</div>

`;

}else{

document.getElementById("hasil").innerHTML="<h3>Order tidak ditemukan.</h3>";

}

})

}

</script>

</body>

</html>
