<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titiport Tracking</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f7fb;
  color:#222;
}
.container{
  max-width:760px;
  margin:40px auto;
  padding:20px;
}
.box{
  background:white;
  padding:28px;
  border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,.08);
}
h1{
  text-align:center;
  color:#0b8ff0;
  margin-bottom:8px;
}
.subtitle{
  text-align:center;
  color:#666;
  margin-bottom:25px;
}
input{
  width:100%;
  box-sizing:border-box;
  padding:15px;
  font-size:16px;
  border:1px solid #ddd;
  border-radius:12px;
}
button{
  width:100%;
  margin-top:12px;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#0b8ff0;
  color:white;
  font-weight:bold;
  font-size:16px;
}
.card{
  margin-top:20px;
  background:#f9fbff;
  padding:18px;
  border-radius:15px;
  border:1px solid #e6edf5;
}
.badge{
  display:inline-block;
  padding:7px 12px;
  background:#e8f4ff;
  color:#0b8ff0;
  border-radius:999px;
  font-weight:bold;
  font-size:13px;
  margin-bottom:10px;
}
.row{
  margin:9px 0;
  line-height:1.45;
}
.label{
  font-weight:bold;
}
.status{
  margin-top:14px;
  padding:13px;
  background:#fff7e6;
  border-radius:12px;
  font-weight:bold;
}
.note{
  margin-top:12px;
  color:#555;
}
.error{
  margin-top:20px;
  background:#fff0f0;
  color:#c0392b;
  padding:15px;
  border-radius:12px;
  text-align:center;
}
.loading{
  margin-top:20px;
  text-align:center;
  color:#555;
}
.photo-section{
  margin-top:18px;
  border-top:1px solid #e6edf5;
  padding-top:15px;
}
.photo-grid{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.photo-box{
  width:31%;
  min-width:150px;
}
.photo-box p{
  font-weight:bold;
}
.photo-box img{
  width:100%;
  border-radius:12px;
  border:1px solid #ddd;
}

@media(max-width:600px){
  .container{
    margin:10px auto;
    padding:12px;
  }
  .box{
    padding:20px;
  }
  h1{
    font-size:24px;
  }
  .photo-box{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="box">
    <h1>📦 Titiport Tracking</h1>
    <div class="subtitle">Cek status order berdasarkan Tracking ID, Order ID, atau Nomor WhatsApp</div>

    <input id="trackingInput" placeholder="Masukkan Tracking ID / Order ID / Nomor WA">
    <button onclick="cekTracking()">Cek Status</button>

    <div id="hasil"></div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzd7mMlzp4_YIlLWAsbkEpdSYTHSWKgP8p8DcVSHzdM9NCJG1EAmuiENDkEhMkWrFv9/exec";

function ubahLinkDrive(url){
  if(!url) return "";

  const match = url.match(/\/d\/([^/]+)/);
  if(match && match[1]){
    return "https://drive.google.com/thumbnail?id=" + match[1] + "&sz=w1000";
  }

  return url;
}

function fotoHTML(label, url){
  if(!url || url.trim() === "") return "";

  const imgUrl = ubahLinkDrive(url);

  return `
    <div class="photo-box">
      <p>${label}</p>
      <a href="${url}" target="_blank">
        <img src="${imgUrl}" alt="${label}">
      </a>
    </div>
  `;
}

function cekTracking(){
  const q = document.getElementById("trackingInput").value.trim();
  const hasil = document.getElementById("hasil");

  if(!q){
    hasil.innerHTML = `<div class="error">Masukkan Tracking ID / Order ID / Nomor WA dulu ya.</div>`;
    return;
  }

  hasil.innerHTML = `<div class="loading">Sedang mencari data order...</div>`;

  fetch(API + "?q=" + encodeURIComponent(q))
    .then(response => response.json())
    .then(data => {
      if(!data.success || !data.data || data.data.length === 0){
        hasil.innerHTML = `<div class="error">Order tidak ditemukan. Coba cek kembali nomor yang dimasukkan.</div>`;
        return;
      }

      let html = "";

      data.data.forEach(item => {
        const fotoSeller = fotoHTML("Foto Seller", item["Foto Seller URL"] || item["Foto Seller"] || "");
        const fotoWarehouse = fotoHTML("Foto Warehouse", item["Foto Warehouse URL"] || item["Foto Warehouse"] || "");
        const fotoIndonesia = fotoHTML("Foto Indonesia", item["Foto Indonesia URL"] || item["Foto Indonesia"] || "");

        const fotoSection = (fotoSeller || fotoWarehouse || fotoIndonesia) ? `
          <div class="photo-section">
            <h3>📷 Dokumentasi Barang</h3>
            <div class="photo-grid">
              ${fotoSeller}
              ${fotoWarehouse}
              ${fotoIndonesia}
            </div>
          </div>
        ` : "";

        html += `
          <div class="card">
            <div class="badge">${item["Jenis Pengiriman"] || "Titiport Order"}</div>

            <div class="row"><span class="label">Tracking ID:</span> ${item["Item Tracking ID"] || "-"}</div>
            <div class="row"><span class="label">Order ID:</span> ${item["Order ID"] || "-"}</div>
            <div class="row"><span class="label">Nama:</span> ${item["Nama Customer"] || "-"}</div>
            <div class="row"><span class="label">Barang:</span> ${item["Nama Barang"] || "-"}</div>
            <div class="row"><span class="label">Qty:</span> ${item["Qty"] || "-"}</div>
            <div class="row"><span class="label">Variasi:</span> ${item["Variasi"] || "-"}</div>
            <div class="row"><span class="label">Batch:</span> ${item["Batch ID"] || "-"}</div>
            <div class="row"><span class="label">ETA:</span> ${item["ETA Manual"] || "-"}</div>

            <div class="status">Status: ${item["Status Order"] || "-"}</div>

            ${fotoSection}

            <div class="note">${item["Catatan Customer"] || ""}</div>
          </div>
        `;
      });

      hasil.innerHTML = html;
    })
    .catch(error => {
      hasil.innerHTML = `
        <div class="error">
          Terjadi kendala saat mengambil data.<br>
          Cek apakah link Apps Script sudah benar dan deployment sudah Anyone.
        </div>
      `;
      console.error(error);
    });
}
</script>

</body>
</html>
